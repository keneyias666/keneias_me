services:
  - type: web
    name: portfolio
    rootDir: portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLOWISE_API_URL
        sync: false
      - key: FLOWISE_API_KEY
        sync: false
