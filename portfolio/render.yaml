services:
  - type: web
    name: portfolio
    env: python
    buildCommand: cd portfolio && pip install -r requirements.txt
    startCommand: cd portfolio && python -m gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLOWISE_API_URL
        sync: false
      - key: FLOWISE_API_KEY
        sync: false
